<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторное оборудование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .equipment-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .equipment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .card-img-top {
            transition: transform 0.3s ease;
        }

        .equipment-card:hover .card-img-top {
            transform: scale(1.05);
        }

        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #02818a;
        }

        .btn-primary {
            background-color: #6cdebb;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #fd7e14;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #fd7e14;
            border: none;
        }

        .btn-secondary:hover {
            background-color: #2d6a4f;
        }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }
        }

        .search-container {
            margin-bottom: 2rem;
        }

        .search-input {
            border: 2px solid #2d6a4f;
            border-radius: 25px;
            padding: 10px 20px;
            width: 100%;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #fd7e14;
            box-shadow: 0 0 0 3px rgba(253, 126, 20, 0.1);
        }

        .equipment-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-B3aoMLq6.js"></script>
</head>
<body>
    <div id="app"></div>
</body>
</html>
